services:
  auth-service:
    build:
      context: ./auth-service
    container_name: togglemaster-auth-service
    environment:
      APP_PORT: 8081
      PORT: 8081
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USER: authuser
      DB_PASSWORD: authpass
      DATABASE_URL: postgres://authuser:authpass@auth-db:5432/authdb?sslmode=disable
      MASTER_KEY: local-master-key
    ports:
      - "8081:8081"
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - togglemaster

  flag-service:
    build:
      context: ./flag-service
    container_name: togglemaster-flag-service
    environment:
      APP_PORT: 8082
      PORT: 8082
      DB_HOST: feature-db
      DB_PORT: 5432
      DB_NAME: featuredb
      DB_USER: featureuser
      DB_PASSWORD: featurepass
      DATABASE_URL: postgres://featureuser:featurepass@feature-db:5432/featuredb?sslmode=disable
      AUTH_SERVICE_URL: http://auth-service:8081
    ports:
      - "8082:8082"
    depends_on:
      auth-service:
        condition: service_healthy
      feature-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8082/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - togglemaster

  targeting-service:
    build:
      context: ./targeting-service
    container_name: togglemaster-targeting-service
    environment:
      APP_PORT: 8083
      PORT: 8083
      DB_HOST: targeting-db
      DB_PORT: 5432
      DB_NAME: targetingdb
      DB_USER: targetinguser
      DB_PASSWORD: targetingpass
      DATABASE_URL: postgres://targetinguser:targetingpass@targeting-db:5432/targetingdb?sslmode=disable
      AUTH_SERVICE_URL: http://auth-service:8081
    ports:
      - "8083:8083"
    depends_on:
      auth-service:
        condition: service_healthy
      targeting-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8083/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - togglemaster

  evaluation-service:
    build:
      context: ./evaluation-service
    container_name: togglemaster-evaluation-service
    env_file:
      - ./evaluation-service/.env
    environment:
      APP_PORT: 8084
      PORT: 8084
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      FLAG_SERVICE_URL: http://flag-service:8082
      TARGETING_SERVICE_URL: http://targeting-service:8083
      SQS_ENDPOINT: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/toggle-events
      AWS_SQS_URL: http://localstack:4566/000000000000/toggle-events
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "8084:8084"
    depends_on:
      flag-service:
        condition: service_healthy
      targeting-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      local-resources:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - togglemaster

  analytics-service:
    build:
      context: ./analytics-service
    container_name: togglemaster-analytics-service
    environment:
      APP_PORT: 8085
      PORT: 8085
      SQS_ENDPOINT: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/toggle-events
      AWS_SQS_URL: http://localstack:4566/000000000000/toggle-events
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_TABLE: toggle_events
      AWS_DYNAMODB_TABLE: toggle_events
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "8085:8085"
    depends_on:
      local-resources:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - togglemaster

  auth-db:
    image: postgres:16-alpine
    container_name: togglemaster-auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./auth-service/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - togglemaster

  feature-db:
    image: postgres:16-alpine
    container_name: togglemaster-feature-db
    environment:
      POSTGRES_DB: featuredb
      POSTGRES_USER: featureuser
      POSTGRES_PASSWORD: featurepass
    ports:
      - "5434:5432"
    volumes:
      - feature-db-data:/var/lib/postgresql/data
      - ./flag-service/db/init.sql:/docker-entrypoint-initdb.d/01-flags.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U featureuser -d featuredb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - togglemaster

  targeting-db:
    image: postgres:16-alpine
    container_name: togglemaster-targeting-db
    environment:
      POSTGRES_DB: targetingdb
      POSTGRES_USER: targetinguser
      POSTGRES_PASSWORD: targetingpass
    ports:
      - "5435:5432"
    volumes:
      - targeting-db-data:/var/lib/postgresql/data
      - ./targeting-service/db/init.sql:/docker-entrypoint-initdb.d/01-targeting.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U targetinguser -d targetingdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - togglemaster

  redis:
    image: redis:7-alpine
    container_name: togglemaster-redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - togglemaster

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: togglemaster-dynamodb-local
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - togglemaster

  localstack:
    image: localstack/localstack-pro:2026.3.0
    container_name: togglemaster-localstack
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
      EDGE_PORT: 4566
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep 'sqs'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - togglemaster

  local-resources:
    image: amazon/aws-cli:2.17.49
    container_name: togglemaster-local-resources
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      dynamodb-local:
        condition: service_healthy
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name toggle-events
      &&
      aws --endpoint-url=http://dynamodb-local:8000 dynamodb create-table
      --table-name toggle_events
      --attribute-definitions AttributeName=event_id,AttributeType=S
      --key-schema AttributeName=event_id,KeyType=HASH
      --billing-mode PAY_PER_REQUEST
      || aws --endpoint-url=http://dynamodb-local:8000 dynamodb describe-table --table-name toggle_events
      "
    networks:
      - togglemaster

networks:
  togglemaster:
    driver: bridge

volumes:
  auth-db-data:
  feature-db-data:
  targeting-db-data:
