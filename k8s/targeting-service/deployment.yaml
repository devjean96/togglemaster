apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: togglemaster
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/part-of: togglemaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: targeting-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: targeting-service
        app.kubernetes.io/part-of: togglemaster
    spec:
      containers:
        - name: targeting-service
          image: ACCOUNT_ID_AWS.dkr.ecr.us-east-1.amazonaws.com/targeting-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8003
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: targeting-service-config
                  key: PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: DATABASE_URL
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: targeting-service-config
                  key: AUTH_SERVICE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20

